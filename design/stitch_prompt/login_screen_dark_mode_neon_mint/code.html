<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Prompt Optimization Tool</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Space Grotesk -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Configuration for Custom Colors -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', 'ui-sans-serif', 'system-ui'],
          },
          colors: {
            primaryMint: '#00FFD1',
            bgDeepSlate: '#0F172A',
            surfaceSlate: '#1E293B',
            borderSlate: '#334155',
            textPrimary: '#F1F5F9',
            textSecondary: '#94A3B8',
          }
        }
      }
    }
  </script>
<!-- Custom Styles for UI Refinements -->
<style data-purpose="custom-transitions">
    .btn-transition {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-focus:focus {
      border-color: #00FFD1;
      box-shadow: 0 0 0 2px rgba(0, 255, 209, 0.2);
    }
    .glow-mint {
      box-shadow: 0 0 15px rgba(0, 255, 209, 0.3);
    }
    .hover-glow-mint:hover {
      box-shadow: 0 0 20px rgba(0, 255, 209, 0.4);
    }
  </style>
</head>
<body class="bg-bgDeepSlate min-h-screen flex items-center justify-center font-sans antialiased text-textPrimary">
<!-- BEGIN: MainContainer -->
<main class="w-full max-w-md px-6 py-12" data-purpose="login-container">
<!-- BEGIN: HeaderSection -->
<header class="text-center mb-10" data-purpose="brand-header">
<!-- Logo Placeholder -->
<div class="inline-flex items-center justify-center w-16 h-16 bg-primaryMint rounded-xl mb-4 shadow-lg shadow-cyan-500/20 glow-mint">
<svg class="h-10 w-10 text-bgDeepSlate" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="text-2xl font-bold tracking-tight text-textPrimary">Prompt Optimization Tool</h1>
<p class="text-textSecondary mt-2">Refine your AI interactions with precision</p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: LoginForm -->
<section class="bg-surfaceSlate p-8 rounded-lg shadow-2xl shadow-black/20 border border-borderSlate" data-purpose="login-form-card">
<form action="#" class="space-y-6" method="POST">
<!-- Username Field -->
<div class="space-y-1">
<label class="block text-sm font-medium text-textSecondary" for="username">Username</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-borderSlate bg-bgDeepSlate/50 input-focus outline-none text-textPrimary placeholder:text-slate-600" id="username" name="username" placeholder="Enter your username" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium text-textSecondary" for="password">Password</label>
<a class="text-xs text-primaryMint hover:text-cyan-200 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-borderSlate bg-bgDeepSlate/50 input-focus outline-none text-textPrimary placeholder:text-slate-600" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<div class="pt-2">
<button class="w-full py-3 px-4 bg-primaryMint text-bgDeepSlate font-bold rounded-lg shadow-lg shadow-cyan-500/10 hover:bg-cyan-200 active:scale-[0.98] btn-transition focus:outline-none focus:ring-2 focus:ring-primaryMint focus:ring-offset-2 focus:ring-offset-surfaceSlate hover-glow-mint" type="submit">
            Login
          </button>
</div>
<!-- Secondary Actions -->
<div class="mt-6 text-center text-sm text-textSecondary">
          Don't have an account? 
          <a class="text-primaryMint font-semibold hover:text-cyan-200 transition-colors" href="#">Sign up for free</a>
</div>
</form>
</section>
<!-- END: LoginForm -->
<!-- BEGIN: FooterLinks -->
<footer class="mt-8 text-center text-xs text-textSecondary/60" data-purpose="legal-footer">
<div class="flex justify-center space-x-4 mb-2">
<a class="hover:text-textSecondary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-textSecondary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-textSecondary transition-colors" href="#">Support</a>
</div>
<p>© 2023 Prompt Optimization Tool. All rights reserved.</p>
</footer>
<!-- END: FooterLinks -->
</main>
<!-- END: MainContainer -->
</body></html>
